name: Artifacts at every commit
on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Setup Python 3.14
        uses: actions/setup-python@v2
        with:
          python-version: 3.14
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev
      - name: Get Minecraft version
        id: get-mc-version
        run: |
          MC_VERSION=$(uv run python -c 'import yaml; print(yaml.safe_load(open("beet.yaml"))["minecraft"])')
          echo "mc_version=$MC_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Setup OpenGL and Run Tests
        uses: edayot/model_resolver@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_HASH: ${{ github.sha }}
          MC_VERSION: ${{ steps.get-mc-version.outputs.mc_version }}
        with:
          commands: |
            uv run beet -s data_pack.name=\"datapack\"

            uv run mcward test -p ./build/datapack -v $MC_VERSION --reporter github

      
      # Upload build/ datapack.zip, resourcepack.zip, datapack-bundled.zip, resourcepack-bundled.zip
      - uses: actions/upload-artifact@v4
        with:
          name: datapack
          path: build/datapack/
      - uses: actions/upload-artifact@v4
        with:
          name: datapack-bundled
          path: build/datapack-bundled/
